name: Bug report
description: Report a problem with TMP3 Finder
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include steps to reproduce. This build targets **TMP3 Demo** only.

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.2.0"
    validations:
      required: true

  - type: dropdown
    id: edition
    attributes:
      label: TMP3 edition
      options:
        - Demo
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Finder
        2. Select mode ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / extra context
      description: Drag images here or paste error text.
