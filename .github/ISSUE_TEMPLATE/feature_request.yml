name: Feature request
description: Suggest an improvement for TMP3 Finder
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "It's hard to ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search
        - UI / UX
        - Settings
        - Localization
        - Build / packaging
        - Other
