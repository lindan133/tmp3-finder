name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win portable nsis --config.directories.output=release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/TMP3-Finder-Portable.exe
            release/TMP3-Finder-Setup-*.exe
          generate_release_notes: true
